name: Reusable do-docs workflow

on:
  workflow_call:
    inputs:
      mdx:
        required: true
        type: string
        description: 'path to the MDX docs folder. Should be relative to the root of the repository, not starting with `./`, eg: `docs`'
      libname:
        required: true
        type: string
      libname_short:
        type: string
      libname_dotsuffix_label:
        type: string
        default: 'docs'
      libname_dotsuffix_href:
        type: string
      home_redirect:
        required: true
        type: string
        default: '/getting-started/introduction'
      nav_order:
        type: string
        description: 'optional sidebar order, as a YAML list of folder names. Group them under a label by nesting the list under a key. Folders left out keep the default (alphabetical) order, at the end'
      nav_labels:
        type: string
        description: 'optional sidebar display names, as a YAML `slug: Label` mapping, for names the default capitalization gets wrong, eg: `sql: SQL`'
      locale:
        type: string
        default: 'en'
        description: 'language of the UI chrome -- search box, "On This Page", prev/next, theme toggle. One of `en`, `pt-BR`. Your MDX content is never translated'
      icon:
        type: string
        default: '🖨️'
      logo:
        type: string
        default: '/logo.png'
      base_path:
        type: string
      github:
        type: string
      discord:
        type: string
      theme_primary:
        type: string
        default: '#323e48'
      theme_scheme:
        type: string
        default: 'tonalSpot'
      theme_contrast:
        type: string
        default: '0'
      theme_note:
        type: string
        default: '#1f6feb'
      theme_tip:
        type: string
        default: '#238636'
      theme_important:
        type: string
        default: '#8957e5'
      theme_warning:
        type: string
        default: '#d29922'
      theme_caution:
        type: string
        default: '#da3633'
      static_page_generation_timeout:
        type: string
        default: '60'
        description: 'seconds allowed per statically generated page. Raise it for large docs sets'
      docker_tag:
        type: string
        default: '3'
        description: 'Docker image tag for ghcr.io/thiagocajadev/do-docs'

jobs:
  build-job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - id: configurepages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/workflow-commands-for-github-actions#example-of-setting-an-output-parameter
      - id: set-base-path
        run: echo "BASE_PATH=${{ inputs.base_path || steps.configurepages.outputs.base_path }}" >> "$GITHUB_OUTPUT"
      - run: |
          set -ex

          # Images can live in a folder that sits *next to* the docs (referenced as `../assets/...`
          # from the markdown), so mount that too. Created empty when absent, which copies nothing.
          ASSETS="$(dirname "$MDX")/assets"
          mkdir -p "$ASSETS"

          docker run --rm --init \
            -v "./$MDX":/app/docs \
            -v "./$ASSETS":/app/assets \
            -e MDX \
            -e NEXT_PUBLIC_LIBNAME \
            -e NEXT_PUBLIC_LIBNAME_SHORT \
            -e NEXT_PUBLIC_LIBNAME_DOTSUFFIX_LABEL \
            -e NEXT_PUBLIC_LIBNAME_DOTSUFFIX_HREF \
            -e BASE_PATH \
            -e DIST_DIR \
            -e OUTPUT \
            -e HOME_REDIRECT \
            -e NAV_ORDER \
            -e NAV_LABELS \
            -e NEXT_PUBLIC_LOCALE \
            -e STATIC_PAGE_GENERATION_TIMEOUT \
            -e MDX_BASEURL \
            -e SOURCECODE_BASEURL \
            -e EDIT_BASEURL \
            -e NEXT_PUBLIC_URL \
            -e ICON \
            -e LOGO \
            -e GITHUB \
            -e DISCORD \
            -e THEME_PRIMARY \
            -e THEME_SCHEME \
            -e THEME_CONTRAST \
            -e THEME_NOTE \
            -e THEME_TIP \
            -e THEME_IMPORTANT \
            -e THEME_WARNING \
            -e THEME_CAUTION \
            -e CONTRIBUTORS_PAT \
            ghcr.io/thiagocajadev/do-docs:${{ inputs.docker_tag }} pnpm run build
        env:
          MDX: ${{ inputs.mdx }}
          NEXT_PUBLIC_LIBNAME: ${{ inputs.libname }}
          NEXT_PUBLIC_LIBNAME_SHORT: ${{ inputs.libname_short }}
          NEXT_PUBLIC_LIBNAME_DOTSUFFIX_LABEL: ${{ inputs.libname_dotsuffix_label }}
          NEXT_PUBLIC_LIBNAME_DOTSUFFIX_HREF: ${{ inputs.libname_dotsuffix_href }}
          BASE_PATH: ${{ steps.set-base-path.outputs.BASE_PATH }}
          DIST_DIR: '${{ inputs.mdx }}/out${{ steps.set-base-path.outputs.BASE_PATH }}'
          OUTPUT: 'export'
          HOME_REDIRECT: ${{ inputs.home_redirect }}
          NAV_ORDER: ${{ inputs.nav_order }}
          NAV_LABELS: ${{ inputs.nav_labels }}
          NEXT_PUBLIC_LOCALE: ${{ inputs.locale }}
          STATIC_PAGE_GENERATION_TIMEOUT: ${{ inputs.static_page_generation_timeout }}
          MDX_BASEURL: 'https://github.com/${{ github.repository }}/raw/${{ github.head_ref || github.ref_name }}/${{ inputs.mdx }}'
          SOURCECODE_BASEURL: 'https://github.com/${{ github.repository }}/tree/${{ github.head_ref || github.ref_name }}'
          EDIT_BASEURL: 'https://github.com/${{ github.repository }}/edit/${{ github.head_ref || github.ref_name }}/${{ inputs.mdx }}'
          NEXT_PUBLIC_URL: ${{ steps.configurepages.outputs.base_url }}
          ICON: '${{ inputs.icon }}'
          LOGO: '${{ inputs.logo }}'
          GITHUB: '${{ inputs.github }}'
          DISCORD: '${{ inputs.discord }}'
          THEME_PRIMARY: '${{ inputs.theme_primary }}'
          THEME_SCHEME: '${{ inputs.theme_scheme }}'
          THEME_CONTRAST: '${{ inputs.theme_contrast }}'
          THEME_NOTE: '${{ inputs.theme_note }}'
          THEME_TIP: '${{ inputs.theme_tip }}'
          THEME_IMPORTANT: '${{ inputs.theme_important }}'
          THEME_WARNING: '${{ inputs.theme_warning }}'
          THEME_CAUTION: '${{ inputs.theme_caution }}'
          CONTRIBUTORS_PAT: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ inputs.mdx }}/out${{ steps.set-base-path.outputs.BASE_PATH }}
