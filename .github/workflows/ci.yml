name: CI
on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  main-job:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write

    steps:
      #
      # ███████ ███████ ████████ ██    ██ ██████
      # ██      ██         ██    ██    ██ ██   ██
      # ███████ █████      ██    ██    ██ ██████
      #      ██ ██         ██    ██    ██ ██
      # ███████ ███████    ██     ██████  ██
      #

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      #
      # ████████ ███████ ███████ ████████
      #    ██    ██      ██         ██
      #    ██    █████   ███████    ██
      #    ██    ██           ██    ██
      #    ██    ███████ ███████    ██
      #

      - run: pnpm test

      #
      # ██    ██ ███████ ██████  ███████ ██  ██████  ███    ██
      # ██    ██ ██      ██   ██ ██      ██ ██    ██ ████   ██
      # ██    ██ █████   ██████  ███████ ██ ██    ██ ██ ██  ██
      #  ██  ██  ██      ██   ██      ██ ██ ██    ██ ██  ██ ██
      #   ████   ███████ ██   ██ ███████ ██  ██████  ██   ████
      #
      # Releases are cut by bumping `version` in package.json: the check below detects it, and the
      # Docker publish + git tags are gated on it. Every other push just builds and tests.
      #

      - name: Check version bump
        id: check
        uses: EndBug/version-check@v2
        with:
          diff-search: true

      - id: get-version
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          MAJOR_VERSION=$(echo "$VERSION" | cut -d. -f1)
          echo "major_version=$MAJOR_VERSION" >> $GITHUB_OUTPUT

          echo "Using version: $VERSION (major: $MAJOR_VERSION)"

      #
      # ██████   ██████   ██████ ██   ██ ███████ ██████
      # ██   ██ ██    ██ ██      ██  ██  ██      ██   ██
      # ██   ██ ██    ██ ██      █████   █████   ██████
      # ██   ██ ██    ██ ██      ██  ██  ██      ██   ██
      # ██████   ██████   ██████ ██   ██ ███████ ██   ██
      #
      # The image IS the product: the reusable build.yml runs it to render anyone's docs.
      #

      - uses: docker/login-action@v3
        if: steps.check.outputs.changed == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        if: steps.check.outputs.changed == 'true'
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.get-version.outputs.major_version }}
            type=raw,value=${{ steps.get-version.outputs.version }}

      - uses: docker/build-push-action@v6
        id: push
        with:
          context: .
          # Always build, so a broken Dockerfile fails the PR. Only push on a version bump.
          push: ${{ steps.check.outputs.changed == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - uses: actions/attest-build-provenance@v3
        if: steps.check.outputs.changed == 'true'
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: git tags
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"

          VERSION=${{ steps.get-version.outputs.version }}
          MAJOR_VERSION=${{ steps.get-version.outputs.major_version }}

          # vX.Y.Z pins a release; vX is what build.yml's `docker_tag` default tracks.
          git tag -fa v$VERSION -m "Update version tag to v$VERSION"
          git tag -fa v$MAJOR_VERSION -m "Update major version tag to v$MAJOR_VERSION"

          git push origin v$MAJOR_VERSION v$VERSION --force
